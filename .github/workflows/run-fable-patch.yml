name: Run Fable patch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract and run patch script
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          src = Path('.github/workflows/apply-fable-paper-theme.yml').read_text(encoding='utf-8')
          marker = '      - name: Apply Fable paper-research theme and merge latest note\n'
          start = src.index(marker)
          run_start = src.index('        run: |\n', start) + len('        run: |\n')
          end = src.index('      - name: Commit and push\n', run_start)
          lines = src[run_start:end].splitlines()
          code = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines)
          Path('/tmp/fable_patch.py').write_text(code, encoding='utf-8')
          PY
          python /tmp/fable_patch.py
      - name: Commit and push
        shell: bash
        run: |
          if git diff --quiet -- index.html; then echo "No changes needed."; exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Apply Fable paper theme and add note 025"
          git push
