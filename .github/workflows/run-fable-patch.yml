name: Apply exact Fable CSS

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/run-fable-patch.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply Fable paper-research CSS
        shell: python
        run: |
          from pathlib import Path
          import base64, zlib, re
          p=Path("index.html")
          html=p.read_text(encoding="utf-8")
          style=zlib.decompress(base64.b64decode("")).decode("utf-8")
          style += """
          /* User preference: all visible text uses a serif stack. */
          body,button,input,textarea,select,table,code,pre,.brand strong,.brand small,
          .nav-chapter,.nav-link,.hero h1,.hero-subtitle,.eyebrow,.chapter-header h1,
          .chapter-intro,.knowledge-card h2,.card-content,.subsection h2,.subsection-content,
          .example-card h3,.stat,.copy-link,.number-badge,.figure-card figcaption {
            font-family:var(--serif)!important;
          }
          """
          html=re.sub(r"<style>.*?</style>",lambda _:"<style>\n"+style+"\n</style>",html,count=1,flags=re.S)
          html=re.sub(r"<title>.*?</title>","<title>PA 价格行为知识库 · 纸面研究室</title>",html,count=1,flags=re.S)
          p.write_text(html,encoding="utf-8")
      - name: Commit and push
        run: |
          if git diff --quiet -- index.html; then echo "No changes needed."; exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Apply exact Fable web style"
          git push
