name: Add TR eventual trend note

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/add-tr-eventual-trend-note.yml

permissions:
  contents: write

jobs:
  update-note:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add knowledge card and image
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path("index.html")
          html = path.read_text(encoding="utf-8")

          new_id = "tr最终会进入趋势平衡期与失衡期"
          new_title = "TR最终会进入趋势：平衡期与失衡期"

          image_b64 = ""
          image_uri = "data:image/webp;base64," + image_b64

          nav_link = f'<a class="nav-link" href="#{new_id}" data-target="{new_id}">023｜{new_title}</a>\n'
          start = html.find('<a class="nav-chapter" href="#knowledge">知识盲点</a>')
          if start != -1 and f'href="#{new_id}"' not in html:
              end = html.find('</div></div>', start)
              html = html[:end] + nav_link + html[end:]

          card = f'''
          <article class="knowledge-card searchable" id="{new_id}"
            data-search="023 TR 交易区间 最终 突破 趋势 平衡期 失衡期 买压 卖压 波段 跟随 2nd leg trap 条件概率">
            <div class="card-topline">
              <span class="number-badge">023</span>
              <button class="copy-link" aria-label="复制本节链接" data-link="#{new_id}">链接</button>
            </div>
            <h2>{new_title}</h2>
            <div class="card-content">
              <figure class="figure-card">
                <img src="{image_uri}" alt="交易区间最终突破进入趋势" loading="lazy">
                <figcaption>TR不会永远保持平衡；买卖压力逐渐失衡后，最终会向一边突破并进入趋势。</figcaption>
              </figure>
              <p><strong>结论：</strong>所有TR最终都会结束并进入趋势，但“最终”可能很久。真正有交易价值的不是这句必然性，而是识别TR何时从<strong>平衡期</strong>转入<strong>失衡期</strong>。</p>
              <p><strong>平衡期：</strong>多空腿质量接近、突破反复失败、价格持续回到中间。此时继续低买高卖，不提前猜方向。</p>
              <p><strong>失衡期：</strong>一方的趋势K更大、更连续、回调更浅，另一方的突破反复失败，高低点开始持续倾斜。此时突破方向的概率才开始偏移。</p>
              <p><strong>概率理解：</strong>完全平衡时先验约50/50；多次一致的买压或卖压证据，可将方向概率小幅更新至约55%附近；真正强突破＋跟随后，才进入更有意义的约60%延续区间。以上为合理估算，不是阿布官方精确数字。</p>
              <p><strong>防止误判：</strong>单次强第二腿可能只是2nd leg trap。只有<strong>重复失衡＋位置合理＋突破跟随</strong>，才比单纯“哪条腿更猛”可靠。</p>
              <p><strong>如果……那么……</strong></p>
              <ul>
                <li><strong>如果</strong>TR内部仍完全双向，<strong>那么</strong>继续边缘反转交易，不猜突破。</li>
                <li><strong>如果</strong>一方多次推进更强、另一方突破屡败，<strong>那么</strong>减少逆势单，可小仓提前布局强势方向。</li>
                <li><strong>如果</strong>只是单次强第二腿冲向TR边缘，<strong>那么</strong>先防2nd leg trap，不追。</li>
                <li><strong>如果</strong>强突破区间并出现同向跟随，<strong>那么</strong>停止低买高卖，切换为趋势波段思维。</li>
              </ul>
              <p><strong>对我交易的启发：</strong>把TR分成两套模式：<strong>平衡期只做极值反转；失衡期减少逆势、等待突破；确认后持有波段。</strong>提前布局只能小仓，因为失衡只是概率倾斜，不是突破确认。</p>
              <p><strong>记忆：</strong><br>TR不会永远横；先看压力失衡，再等突破确认。</p>
              <p><code>TR</code> <code>压力失衡</code> <code>条件概率</code> <code>趋势切换</code></p>
            </div>
          </article>
          '''

          if f'id="{new_id}"' not in html:
              section = html.find('<section class="chapter" id="knowledge"')
              grid = html.find('<div class="knowledge-grid">', section)
              end = html.find('</div>\n</section>', grid)
              html = html[:end] + card + html[end:]

          stat = re.compile(r'(<div class="stat"><strong>)\d+(</strong><span>知识盲点</span></div>)')
          html = stat.sub(r'\g<1>23\2', html, count=1)

          vis = re.compile(r'(<div class="stat"><strong>)(\d+)(</strong><span>视觉案例</span></div>)')
          match = vis.search(html)
          if match:
              html = vis.sub(lambda m: f"{m.group(1)}{int(m.group(2))+1}{m.group(3)}", html, count=1)

          template_id = "二-bom-与突破"
          section = html.find(f'<section class="subsection searchable" id="{template_id}"')
          extra = '<li><strong>如果</strong>TR中一方多次推进更强、另一方突破屡败，<strong>那么</strong>把方向概率小幅倾斜，但仍只小仓预布局；只有强突破＋跟随后，才切换成趋势波段。</li>\n'
          if section != -1 and "只小仓预布局；只有强突破＋跟随后" not in html:
              end = html.find('</ul>', section)
              html = html[:end] + extra + html[end:]

          path.write_text(html, encoding="utf-8")

      - name: Commit and push
        run: |
          if git diff --quiet -- index.html; then
            echo "No changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add TR balance and imbalance note"
          git push
