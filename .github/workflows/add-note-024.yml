name: Add note 024

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/add-note-024.yml

permissions:
  contents: write

jobs:
  update-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Insert knowledge note
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path("index.html")
          html = path.read_text(encoding="utf-8")

          new_id = "024-失败的反向突破是加分项不是必要条件"
          title = "失败的反向突破是加分项，不是必要条件"

          nav = f'''<a class="nav-link" href="#{new_id}" data-target="{new_id}">024｜{title}</a>\n'''

          card = f'''
          <article class="knowledge-card searchable" id="{new_id}"
            data-search="024 失败反向突破 强多头突破 跟随 牛旗 浅回调 胜率 RR EV 贝叶斯">
            <div class="card-topline">
              <span class="number-badge">024</span>
              <button class="copy-link" aria-label="复制本节链接" data-link="#{new_id}">链接</button>
            </div>
            <h2>{title}</h2>
            <div class="card-content">
              <figure class="figure-card">
                <img src="assets/024-failed-opposite-breakout-adds-confidence.svg" alt="失败反向突破为强突破增加可信度的示意图" loading="lazy">
                <figcaption>失败空破给多头额外加分；强突破与后续跟随才是核心证据。</figcaption>
              </figure>

              <p><strong>结论：</strong>前面没有失败空破，多头突破的可信度会下降一点，但不会大幅下降。<strong>失败的反向突破是加分项，不是必要条件；强突破＋跟随才是核心项。</strong></p>

              <p><strong>概率理解：</strong>TR内先验接近50/50。只有强多头突破时，可粗略把延续概率更新至约55%～60%；若再叠加失败空破、持续买压，可能进一步上调到约60%～65%。这些是教学估算，不是阿布官方精确统计。</p>

              <p><strong>如果……那么……</strong></p>
              <ul>
                <li><strong>如果</strong>没有失败空破，但大阳线强势收出TR，后面还有同向跟随，<strong>那么</strong>仍可按多头突破处理。</li>
                <li><strong>如果</strong>没有失败空破，且只有一根大阳线、没有跟随，<strong>那么</strong>降低仓位，优先等待第一次浅回调突破。</li>
                <li><strong>如果</strong>先出现失败空破，再出现强多头突破，<strong>那么</strong>多头可信度和波段预期都提高。</li>
                <li><strong>如果</strong>突破后迅速跌回TR，<strong>那么</strong>立即撤销多头升级，重新按区间处理。</li>
              </ul>

              <p><strong>对我交易的启发：</strong>不要把“失败反向突破”设成强制条件。没有这个加分项时，少一点仓位、少一点追价，多等一次浅回调确认；有这个加分项时，才更愿意把突破单拿成波段。</p>

              <p><strong>记忆：</strong><br>失败空破是加分项，强突破跟随才是必答题。</p>
              <p><code>TR BO</code> <code>Failed Breakout</code> <code>Follow-through</code> <code>Bayesian Update</code></p>
            </div>
          </article>
          '''

          if f'id="{new_id}"' not in html:
              nav_start = html.find('<a class="nav-chapter" href="#knowledge">知识盲点</a>')
              if nav_start == -1:
                  raise RuntimeError("knowledge navigation not found")
              nav_end = html.find('</div></div>', nav_start)
              if nav_end == -1:
                  raise RuntimeError("knowledge navigation end not found")
              html = html[:nav_end] + nav + html[nav_end:]

              chapter_start = html.find('<section class="chapter" id="knowledge"')
              grid_start = html.find('<div class="knowledge-grid">', chapter_start)
              grid_end = html.find('</div>\n</section>', grid_start)
              if grid_end == -1:
                  raise RuntimeError("knowledge grid end not found")
              html = html[:grid_end] + card + html[grid_end:]

              def inc_stat(label, text):
                  pattern = re.compile(rf'(<div class="stat"><strong>)(\d+)(</strong><span>{re.escape(label)}</span></div>)')
                  return pattern.sub(lambda m: f"{m.group(1)}{int(m.group(2))+1}{m.group(3)}", text, count=1)

              html = inc_stat("知识盲点", html)
              html = inc_stat("视觉案例", html)

              section_id = "二-bom-与突破"
              section_start = html.find(f'<section class="subsection searchable" id="{section_id}"')
              extra = '''
              <li><strong>如果</strong>没有失败的反向突破，但出现强突破K＋跟随，<strong>那么</strong>仍可顺突破方向交易；只是减少追价和仓位，优先等待第一次浅回调确认。</li>
              '''
              if section_start != -1 and "减少追价和仓位，优先等待第一次浅回调确认" not in html:
                  ul_end = html.find('</ul>', section_start)
                  if ul_end != -1:
                      html = html[:ul_end] + extra + html[ul_end:]

              path.write_text(html, encoding="utf-8")

          workflow = Path(".github/workflows/add-note-024.yml")
          if workflow.exists():
              workflow.unlink()

      - name: Commit and push
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/024-failed-opposite-breakout-adds-confidence.svg .github/workflows/add-note-024.yml
          git commit -m "Add failed opposite breakout confidence note"
          git push
