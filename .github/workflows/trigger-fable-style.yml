name: Trigger Fable style deployment

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/trigger-fable-style.yml
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Fable style workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run run-fable-patch.yml --repo "${{ github.repository }}" --ref main
