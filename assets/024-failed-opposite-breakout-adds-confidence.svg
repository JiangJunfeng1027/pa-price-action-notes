<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <defs>
    <style>
      .t{font-family:'Songti SC','STSong','Noto Serif CJK SC','SimSun',serif;fill:#1d2738}
      .small{font-size:24px}.mid{font-size:30px;font-weight:700}.big{font-size:42px;font-weight:800}
      .wick{stroke:#222;stroke-width:4}.bull{fill:#fff;stroke:#222;stroke-width:4}.bear{fill:#222;stroke:#222;stroke-width:4}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#4c6fff"/></marker>
  </defs>
  <rect width="1200" height="680" fill="#f8faff"/>
  <text x="55" y="65" class="t big">失败的反向突破，是加分项，不是必要条件</text>
  <text x="55" y="108" class="t small" fill="#667085">TR → 失败空破 → 强多头突破 → 第一次浅回调</text>

  <rect x="70" y="160" width="700" height="350" rx="18" fill="#e8eefc" stroke="#9fb1e8" stroke-width="3"/>
  <line x1="70" y1="210" x2="770" y2="210" stroke="#4c6fff" stroke-width="5"/>
  <line x1="70" y1="455" x2="770" y2="455" stroke="#4c6fff" stroke-width="5"/>
  <text x="82" y="198" class="t small" fill="#3557d6">TR上沿</text>
  <text x="82" y="490" class="t small" fill="#3557d6">TR下沿</text>

  <!-- range candles -->
  <g>
    <line x1="130" y1="260" x2="130" y2="410" class="wick"/><rect x="113" y="300" width="34" height="65" class="bull"/>
    <line x1="185" y1="245" x2="185" y2="390" class="wick"/><rect x="168" y="275" width="34" height="80" class="bear"/>
    <line x1="240" y1="280" x2="240" y2="430" class="wick"/><rect x="223" y="320" width="34" height="60" class="bull"/>
    <line x1="295" y1="250" x2="295" y2="400" class="wick"/><rect x="278" y="285" width="34" height="75" class="bear"/>
    <line x1="350" y1="270" x2="350" y2="420" class="wick"/><rect x="333" y="305" width="34" height="65" class="bull"/>
    <line x1="405" y1="250" x2="405" y2="390" class="wick"/><rect x="388" y="285" width="34" height="58" class="bear"/>
  </g>

  <!-- failed bear breakout -->
  <line x1="475" y1="310" x2="475" y2="535" class="wick"/>
  <rect x="455" y="345" width="40" height="150" fill="#d95362" stroke="#b63a49" stroke-width="4"/>
  <rect x="430" y="445" width="90" height="85" rx="8" fill="#fff0f2" stroke="#cf4d5f" stroke-width="3" stroke-dasharray="9 8"/>
  <text x="390" y="575" class="t mid" fill="#cf4d5f">失败空破</text>
  <text x="360" y="612" class="t small" fill="#667085">下方卖压失败，追空者回补</text>

  <!-- recovery and bull pressure -->
  <line x1="545" y1="330" x2="545" y2="470" class="wick"/><rect x="528" y="365" width="34" height="72" class="bull"/>
  <line x1="595" y1="300" x2="595" y2="425" class="wick"/><rect x="578" y="330" width="34" height="68" class="bull"/>
  <line x1="645" y1="270" x2="645" y2="385" class="wick"/><rect x="628" y="300" width="34" height="60" class="bull"/>
  <line x1="695" y1="245" x2="695" y2="350" class="wick"/><rect x="678" y="270" width="34" height="55" class="bull"/>

  <!-- strong bull breakout -->
  <line x1="755" y1="120" x2="755" y2="315" class="wick"/>
  <rect x="732" y="155" width="46" height="120" fill="#50b77c" stroke="#27886a" stroke-width="4"/>
  <text x="800" y="165" class="t mid" fill="#27886a">强多头突破</text>
  <text x="800" y="202" class="t small" fill="#667085">大阳线收出TR，可信度显著提升</text>
  <path d="M790 215 C850 235 900 240 955 235" fill="none" stroke="#4c6fff" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- shallow pullback and continuation -->
  <line x1="855" y1="185" x2="855" y2="310" class="wick"/><rect x="838" y="215" width="34" height="52" class="bear"/>
  <line x1="905" y1="190" x2="905" y2="295" class="wick"/><rect x="888" y="218" width="34" height="42" class="bull"/>
  <line x1="955" y1="150" x2="955" y2="275" class="wick"/><rect x="938" y="185" width="34" height="65" class="bull"/>
  <line x1="1010" y1="110" x2="1010" y2="245" class="wick"/><rect x="993" y="145" width="34" height="70" class="bull"/>
  <rect x="820" y="195" width="120" height="95" rx="10" fill="none" stroke="#d9822b" stroke-width="4" stroke-dasharray="10 8"/>
  <text x="810" y="345" class="t mid" fill="#d9822b">第一次浅回调</text>
  <text x="810" y="382" class="t small" fill="#667085">更适合等回调突破入场</text>

  <rect x="70" y="630" width="1060" height="2" fill="#dce3f2"/>
  <text x="70" y="660" class="t small" fill="#3557d6">核心：失败的反向突破是加分项；强突破与后续跟随才是核心证据。</text>
</svg>